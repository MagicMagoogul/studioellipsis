<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Ellipsis</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000;
      color: #fff;
    }

    header {
      background: #000;
      text-align: center;
      padding: 6rem 2rem 3rem;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 3px;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #111;
      padding: 1rem 0;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      margin: 0 1.5rem;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #00c2ff;
    }

    .hamburger {
      display: none;
      font-size: 2rem;
      text-align: center;
      padding: 1rem;
      cursor: pointer;
      background: #111;
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      background: #111;
      text-align: center;
    }

    .mobile-menu a {
      padding: 1rem;
      text-decoration: none;
      color: white;
      border-top: 1px solid #222;
    }

    .mobile-menu a:hover {
      background: #222;
    }

    .main-container {
      display: flex;
      max-width: 1300px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .sidebar {
      width: 250px;
      margin-right: 2rem;
    }

    .sidebar h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      text-transform: uppercase;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 0.5rem;
    }

    .sidebar a {
      text-decoration: none;
      color: #bbb;
    }

    .sidebar a:hover {
      color: #00c2ff;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      flex: 1;
    }

    .gallery-item {
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(255,255,255,0.1);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      filter: grayscale(100%);
    }

    .gallery-item h4 {
      padding: 0.75rem 1rem 0;
      font-size: 1rem;
    }

    .gallery-item p {
      padding: 0 1rem 1rem;
      font-size: 0.85rem;
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 2rem;
      background-color: #111;
      font-size: 0.9rem;
      color: #bbb;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      nav {
        display: none;
      }

      .hamburger {
        display: block;
      }

      .main-container {
        flex-direction: column;
        padding: 0 1rem;
        margin: 1.5rem auto;
      }

      .gallery {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .gallery-item {
        width: 100%;
      }

      header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>STUDIO ELLIPSIS</h1>
  </header>

  <div class="hamburger">☰</div>

  <div class="mobile-menu" id="mobileMenu">
    <a href="Art_Menu.html">ILLUSTRATION</a>
    <a href="Animations.html">ANIMATION</a>
    <a href="3D_Modeling.html"> >3D MODELING</a>
    <a href="https://studioellipsis.org">MENU</a>
  </div>

  <nav>
    <a href="Art_Menu.html">ILLUSTRATION</a>
    <a href="Animations.html">ANIMATION</a>
    <a href="3D_Modeling.html">3D MODELING</a>
    <a href="https://www.studioellipsis.org/">MENU</a>
  </nav>

  <div class="main-container">

    <aside class="sidebar">
      <h3>PROJECTS</h3>
      <ul>
      </ul>
    </aside>

    <main class="gallery">
      <div class="gallery-item">
        <h4>Curious Bot</h4>
        <p>Blender</p>
      </div>

      <div class="gallery-item">
        <a href="#"><img src=""></a>
        <h4>Cereal Add Test</h4>
        <p>Maya</p>
      </div>

      <div class="gallery-item">
        <h4>Template</h4>
        <p>Blender</p>
      </div>

      <div class="gallery-item">
        <a href="#"><img src=""></a>
        <h4>Template</h4>
        <p>Blender</p>
      </div>
    </main>

  </div>

  <footer>
    &copy; 2025 Studio Ellipsis. All rights reserved.
  </footer>

  <script>
    const hamburger = document.querySelector(".hamburger");
    const menu = document.getElementById("mobileMenu");

    hamburger.addEventListener("click", () => {
      if (menu.style.display === "flex") {
        menu.style.display = "none";
      } else {
        menu.style.display = "flex";
      }
    });
  </script>

</body>
</html>
